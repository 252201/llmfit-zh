"""
生成 subconverter INI 格式模板文件（参照 ACL4SSR.ini 格式）
从 merged_config.yaml 读取全部规则并转换为 ruleset= 内联格式
"""

import re

# Clash 规则类型 → subconverter 内联规则类型映射
# 内联规则格式：ruleset=组名,[]类型,值
INLINE_TYPE_MAP = {
    'DOMAIN':          'DOMAIN',
    'DOMAIN-SUFFIX':   'DOMAIN-SUFFIX',
    'DOMAIN-KEYWORD':  'DOMAIN-KEYWORD',
    'IP-CIDR':         'IP-CIDR',
    'IP-CIDR6':        'IP-CIDR6',
    'GEOIP':           'GEOIP',
    'PROCESS-NAME':    'PROCESS-NAME',
    'MATCH':           'MATCH',
    'FINAL':           'FINAL',
}


def extract_rules(file_path):
    with open(file_path, 'r', encoding='utf-8') as f:
        lines = f.readlines()

    in_rules = False
    rules = []
    for line in lines:
        stripped = line.strip()
        if line.startswith('rules:'):
            in_rules = True
            continue
        if in_rules and stripped.startswith('- '):
            rule = stripped[2:].strip()
            if rule:
                rules.append(rule)
    return rules


def rule_to_ruleset_line(rule):
    """
    把 Clash 规则行转换为 subconverter ruleset= 内联格式
    例:
      DOMAIN,example.com,DIRECT          → ruleset=DIRECT,[]DOMAIN,example.com
      IP-CIDR,1.2.3.4/24,YouTube,no-resolve → ruleset=YouTube,[]IP-CIDR,1.2.3.4/24,no-resolve
      MATCH,Final                        → ruleset=Final,[]FINAL
    """
    # 解析规则
    parts = [p.strip() for p in rule.split(',')]
    rule_type = parts[0].upper()

    if rule_type in ('MATCH', 'FINAL'):
        group = parts[1] if len(parts) > 1 else 'Final'
        return f'ruleset={group},[]FINAL'

    if rule_type == 'GEOIP':
        # GEOIP,CN,DIRECT[,no-resolve]
        value = parts[1] if len(parts) > 1 else ''
        group = parts[2] if len(parts) > 2 else 'DIRECT'
        extra = ','.join(parts[3:])
        suffix = f',{extra}' if extra else ''
        return f'ruleset={group},[]GEOIP,{value}{suffix}'

    # 通用规则：类型,值,组[,选项...]
    if len(parts) < 3:
        return f'; 跳过无法解析的规则: {rule}'

    value = parts[1]
    group = parts[2]
    extra = ','.join(parts[3:])
    suffix = f',{extra}' if extra else ''
    return f'ruleset={group},[]{{type}},{value}{suffix}'.replace('{type}', rule_type)


def generate_ini(rules):
    lines = []
    lines.append('[custom]')
    lines.append('; 自定义规则模板 - 由 merged_config.yaml 自动生成')
    lines.append('; 代理组（节点由订阅链接提供，按节点名关键词自动归类）')
    lines.append('')

    # ── 代理组定义 ──────────────────────────────────────────────
    lines.append('; ====== 代理组定义 ======')
    lines.append('custom_proxy_group=Proxies`select`[]HK`[]JP`[]SG`[]TW`[]US`.*')
    lines.append('custom_proxy_group=YouTube`select`[]Proxies`[]HK`[]JP`[]SG`[]TW`[]US')
    lines.append('custom_proxy_group=Netflix`select`[]Proxies`[]HK`[]JP`[]SG`[]TW`[]US')
    lines.append('custom_proxy_group=Disney`select`[]Proxies`[]HK`[]JP`[]SG`[]TW`[]US')
    lines.append('custom_proxy_group=Hbomax`select`[]Proxies`[]HK`[]JP`[]SG`[]TW`[]US')
    lines.append('custom_proxy_group=Bahamut`select`[]Proxies`[]HK`[]TW')
    lines.append('custom_proxy_group=Bilibili`select`[]DIRECT`[]HK`[]TW')
    lines.append('custom_proxy_group=Spotify`select`[]Proxies`[]DIRECT`[]HK`[]JP`[]SG`[]TW`[]US')
    lines.append('custom_proxy_group=Steam`select`[]Proxies`[]DIRECT`[]HK`[]JP`[]SG`[]TW`[]US')
    lines.append('custom_proxy_group=Telegram`select`[]Proxies`[]HK`[]JP`[]SG`[]TW`[]US')
    lines.append('custom_proxy_group=Google`select`[]Proxies`[]HK`[]JP`[]SG`[]TW`[]US')
    lines.append('custom_proxy_group=Microsoft`select`[]Proxies`[]DIRECT`[]HK`[]JP`[]SG`[]TW`[]US')
    lines.append('custom_proxy_group=OpenAI`select`[]Proxies`[]HK`[]JP`[]SG`[]TW`[]US')
    lines.append('custom_proxy_group=PayPal`select`[]Proxies`[]DIRECT`[]HK`[]JP`[]SG`[]TW`[]US')
    lines.append('custom_proxy_group=Apple`select`[]Proxies`[]DIRECT`[]HK`[]JP`[]SG`[]TW`[]US')
    lines.append('custom_proxy_group=Final`select`[]Proxies`[]DIRECT')
    lines.append('; ── 地区自动分组（按节点名关键词匹配）')
    lines.append('custom_proxy_group=HK`url-test`(港|HK|Hong.Kong|hongkong|香港)`http://www.gstatic.com/generate_204`300,,50')
    lines.append('custom_proxy_group=JP`url-test`(日|JP|Japan|Tokyo|东京|日本)`http://www.gstatic.com/generate_204`300,,50')
    lines.append('custom_proxy_group=SG`url-test`(新加坡|狮城|SG|Singapore|singapore)`http://www.gstatic.com/generate_204`300,,50')
    lines.append('custom_proxy_group=TW`url-test`(台湾|台灣|TW|Taiwan|taiwan)`http://www.gstatic.com/generate_204`300,,50')
    lines.append('custom_proxy_group=US`url-test`(美|US|United.States|America|Angeles|New.York|美国)`http://www.gstatic.com/generate_204`300,,150')
    lines.append('')

    # ── 规则集 ──────────────────────────────────────────────────
    lines.append('; ====== 规则集（从 merged_config.yaml 转换）======')
    ok = 0
    skip = 0
    for rule in rules:
        converted = rule_to_ruleset_line(rule)
        lines.append(converted)
        if converted.startswith('; 跳过'):
            skip += 1
        else:
            ok += 1

    lines.append('')
    lines.append('enable_rule_generator=true')
    lines.append('overwrite_original_rules=true')
    lines.append('')

    return '\n'.join(lines), ok, skip


def main():
    print('正在读取 merged_config.yaml 中的规则...')
    rules = extract_rules('merged_config.yaml')
    print(f'共读取 {len(rules)} 条规则')

    config, ok, skip = generate_ini(rules)

    output = 'subconverter_template.ini'
    with open(output, 'w', encoding='utf-8') as f:
        f.write(config)

    print(f'转换成功: {ok} 条 | 跳过: {skip} 条')
    print(f'✅ 已生成: {output}')
    print()
    print('下一步：将此 .ini 文件上传到宝塔服务器的 Web 目录，')
    print('然后在订阅转换「自定义配置文件 URL」中填入对应的公网访问链接。')


if __name__ == '__main__':
    main()
